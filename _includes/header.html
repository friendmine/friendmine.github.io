<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.name }}</title>
	<link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/images/yadong-mark.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <script src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>
    <script src="{{ site.baseurl }}/assets/js/bootstrap.min.js"></script>
    <link href="{{ site.baseurl }}/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="{{ site.baseurl }}/assets/css/font-awesome.min.css" rel="stylesheet" type="text/css">
    <link href="{{ site.baseurl }}/assets/css/main.css" rel="stylesheet" type="text/css">
{% include isso-comments.html %}
</head>

<body class="{% if page.book_active %}book-active{% endif %}">

<div class="container-fluid">
    <div class="row-fluid">
        <div class="navbar navbar-custom navbar-fixed-top" role="navigation">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand site-brand" href="{{ site.baseurl }}/">
                    <span class="site-brand-mark" aria-hidden="true">亚</span>
                    <span class="site-brand-copy">
                        <strong>{{ site.name }}</strong>
                        <small>在线书站</small>
                    </span>
                </a>
            </div>
            <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                <ul class="nav navbar-nav">
                    {% assign trans = site.data.values[site.lan] %}
                    <li class="{% if page.url == '/' %}active{% endif %}"><a href="{{ site.baseurl }}/">{{ trans.home }}</a></li>
                    <li class="{% if page.book_active %}active{% endif %}"><a href="{{ site.baseurl }}/book/">{{ trans.book }}</a></li>
                </ul>
                <div class="nav navbar-nav navbar-right site-nav-cta hidden-xs">
                    <a href="{{ site.baseurl }}/book/guide/essential-reading/">必读 12 章</a>
                </div>
            </div>
        </div>
    </div>
</div>
